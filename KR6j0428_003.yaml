body:
  text: 大興善寺三藏沙門不空奉詔譯無動金剛寶山印第一金剛堅固內相叉是名寶山身密印種種供養并護身加持本明頂上散無動金剛頭印第二禪度入掌把為拳置安頂上名頭印思此全身聖者前靜坐安心作觀照無動金剛髻印第三戒方檀慧內相叉忍願堅合進力附禪智二度背相著屈入戒方相叉內與二無名面相著舉印置安左髻中是名無動金剛髻無動金剛眼印第四準前髻印翻手倒垂至額前即名無動金剛眼無動金剛口印第五檀慧二度內相叉戒方雙押內叉上忍願竪合進力附禪捻戒背智捻方是名聖者金剛口無動金剛心印第六戒方檀慧內相叉忍願竪合屈進力禪智並捻忍願文是名無動金剛心無動金剛師子奮迅印第七準前無動金剛甲唯改進力頭相拄起立頻伸虎舞勢繞壇行道辟除魔師子頻伸大奮迅是名五股金剛印無動金剛火印第八禪捻三度背為拳進度獨舒指定掌散開五度如猛焰是名無動金剛火無動金剛法螺印第九二羽各如無動劍掌內鉤鎖狀猶環忍願竪合頭相拄進興忍背重相著力度願背亦如是是名無動法螺印無動金剛索印第十禪捻三度背為拳進度直舒觀羽握力度屈捻智如環是名無動金剛索明曰曩麼三曼哆嚩日囉二合赧阿引波舍伴闍那吽泮吒半音無動金剛劍印明能成就一切事業明曰唵阿者羅迦拏引勃馱制吒迦吽吽佉醯佉醯伊能魚哩二合醯摩𤚥賀唎尾沙索鉢多二合惡紇哩二合訶吽引泮吒阿哩耶二合者羅阿引蘖車緊至羅夜思伊引能迦哩羅耶二合句嚕耶麼莎縛二合訶持明行者每常食時出一分殘食供養本尊像歡喜擁護所求皆得終不空過復誦無動金剛根本明無動金剛解界明印第十一持明行者念誦了即解前所結火界及牆界已灌頂印竪二小指頭相拄是也當誦燈焰如來解界明以印左轉即成解界前火院界是也燈焰如來解界真言曰曩麼悉底哩也二合陀嚩拏哦哆喃唵紇哩二合誦密語已重以香花如法供養懺悔三業即結部母印護身方可起去轉誦大乘方廣理趣諸善事隨修行持明行者每欲食時以事業金剛真言加持自身中種子加鑁字復誦十力明八遍乃食之明曰曩麼三曼哆鑁十力明曰曩謨薩嚩母馱地薩怛嚩二合喃唵麼蘭捺泥帝引孺㤞㗚寧莎縛二合訶如是先成就本尊訖所餘觸食以成辦諸事心明供養所應食者當用不空威怒增加聖者不動尊明誦一遍受者歡喜當隨行者而護念之每日如是供養不得斷絶常得本尊護念諸魔不能為害施食已如常禮懺依法念誦於中夜分欲消息時即結先莊嚴印無動金剛光莊嚴印明第十二慧手翻掌彎心上定掌還來心上合加持本明安頂上便開二手順身摩能除障難得成就以護身故名莊嚴光莊嚴明曰曩麼悉底哩也四合陀嚩二合拏伽哆喃薩嚩怛他蘖哆喃摩訶三昧耶伽底伽帝三曼帝三摩蘖羅嚩二合摩他薩羅婆多羅二合路計達麼馱埵底多僧伽帝莎嚩二合訶作前法已應如過去燃燈佛禮拜法金剛合掌長舒二臂於頂上面東令面著地長展二足以心著地如是禮拜時觀念一切諸佛菩薩唯願攝受我等作最上成就哀愍故如是三回已後隨意消息心念明相作速成就相無動金剛事業求願第七爾時釋迦牟尼佛告執金剛菩薩言我今為汝説無量神通力無動金剛法能利益成就一切事業若修行者菜食長齋或果子等誦滿一萬遍已於月八日或十五日一日一夜大作供養於像前取苦練木和蘇燒一呪一燒滿一千八遍作此法已然後所作一切事法皆得成就行者出語令縛即縛及問事等能摧折樹木墮落飛鳥能令一切泉池枯渴亦能令人鬪諍獲勝得此已亦能團風而為一團又法於月蝕夜取未著地牛糞塗曼荼羅種種香花散於壇上置大般若經前取純色犢子牸牛蘇一兩置熟銅碗中取佉陀羅木為齒木并攪蘇明不限遍數令種種成就又山峯頂上不喫食誦滿十萬遍即得見一切伏藏又用乳作火法誦一千八遍沃火燒能除疫病若共一切人論議即得彼人口噤不論又法取句瀘草和蘇乳蜜加持沃火中燒誦十萬遍能除大疫病又取蓮花和蘇酪蜜誦明沃火中燒誦明十萬遍蓮華吉祥天與行者願又法於臨近海河口入水至胸誦明三十萬遍得尾沙耶又誦明以華擲火中燒隨華色得衣燒穀米得穀米又取尾邏縛木誦明燒十萬遍即得囉闍又取必哩養隅木誦明燒能令一切人愛念明柏木燒即得無量僕從明大麥燒得為大長者次説畫像法畫無動尊身著赤土色裙衣左垂辮髻眼斜視手執劍索坐寶蓮華嚬眉嗔面作怖三世狀如是畫已於流水河海岸上如法安像行者自身亦著赤色衣心無染著寂靜乞食為活於像前誦五十萬遍畢已即於夜中以薝蔔木火燒一明一燒擲火中滿一萬遍即見無動聖者現前自身得為如來使者得三摩地共菩薩同位又法取尸陀林中帛畫無動金剛像以自身血淡作色安置像面向西著行者面向東坐念誦每時三時澡浴著濕衣對像面前誦明十萬遍即施一切鬼神食又於黑月八日夜取摩奴沙坐其上誦明一萬遍已彼摩奴沙動身行者必不得怕彼口現出大開敷蓮華即把取能令行者身如十五六童子髻如連環遊歷天地得大明王又於像前每日二時念誦隨力供養燒沈水香如是滿足六月自見得尾沙耶主又法取旗幡誦明一千遍執於軍陳前能破他陳又法欲禁他軍令不得動者於旗幡上畫無動尊身作黃肉色四面上下出牙四臂作怖畏瞋怒狀遍身火焰作吞他兵勢持法人以旗示彼人又想聖者以羂索縛彼兵衆彼即無能動也四面無動金剛明曰曩麼三曼哆嚩日羅二合赧始麼二合舍囊悉體二合迦播羅楞訖哩二合哆戶怛嚩賀姥儞𡁠嚩引路囉馱縛二合能瑟吒邏二合迦囉邏娜捨曩步惹誐跛哩吠瑟徵擔捨唎邏底榮捺囉曩野曩迦賀護姥訖哆二合吒賀三者咄姥佉尾訖哩二合怛嚕引跛莽賀避沙拏也怛儞也二合他唵尾訖哩哆尾迦吒尾迦邏摩賀囉𠼐二合哆尾瑟他姥怛羅契駐尼去反齒瑟吒賀囉案怛囉莽羅馱羅者咄姥母佉入嚩二合邏那比路馱嚩二合計奢吽嚩日囉二合嚩日㘑二合蘖羅二合吽泮吒莎嚩二合訶若欲令他相鬪者取鳥鴿鵄梟羽明燒即得鬪諍若欲令燒設都嚕卒者取稻粳燒當燒之時想聖者以索縛彼捨都嚕將向南方困苦吐血彼等族類皆不得存也又法欲令設都嚕卒取土鹽蠟苦練葉相和搗為泥捻作彼形狀置地上斫斷即卒若明稻穀燒令彼捨都嚕即貧窮若欲令大人愛樂者以鹽作彼形狀段段斫之誦滿七日彼即愛樂又取俱蘇摩花明燒十萬遍得夜叉女來於三事中所求皆得又明曼荼羅花稱彼人名即令橫亂明鹽燒即得天女來所使隨意明安息香燒者得闍羅歡喜又畫像法先畫釋迦牟尼佛像畫文殊師利童子像畫執金剛菩薩作微笑面手執金剛杵於執金剛下畫無動聖者種種莊嚴即於彼前誦明五十萬遍然後作一切事皆得稱意若欲令降他兵即結無動聖者眼印作瞋怒聲稱吽字以心想令魍魎捉彼乃降取尸陀林灰加持七遍與彼人即得愛樂又法取牛黃加持七遍點自身額上能令衆人見者愛樂毗那夜迦不能損害熾焰成就故又法於己身上布明梵字彼羅剎衆退散百由旬外又被毒蛇經半年不差明之即差又於壁上畫劍契又畫句律迦大蛇纏劍上其劍周圍有火焰即加持千遍以示病者病者即下語加持一百八遍病者常蒙聖者擁護每日加持殘食置淨處供養聖者常得如願行者瞋怒結心印稱吽字一切惡雲退散又取棘針和羅視迦油明燒能止大雨能令行者成結大界亦成就千種事業又説無動尊金剛畫像法身著赤土色衣左垂辮髻斜視童子狀手執金剛杵及寶棒眼微赤坐石上瞋怒遍身火焰於像前結愛樂一切印契皆得成就依前法作所樂騰空隱形及所愛法隨意成就縱無畫像獨處間靜或在寺中或山窟中離雜閙處所求者一切皆得成就加持患瘧病者即自縛下語加持鏡亦得像現問事皆説取童子或童女置道場中召神入令下壇中問一切事皆得次欲成就繫迦羅法於月一日日中時著種種香華供養不歇誦明一百八遍念壇中一切諸佛菩薩每日念誦滿一月日如法供養已用苦練木柴燒火遏迦木上塗蘇白芥子加持燒火從黃昏燒火至夜半乃至日出繫迦攞即來語行者言使我作何事行者攝受已後常隨行者所使必得隨順乃至使往天上取天女即將來所須飲食齒木水等皆得給侍復次如前建立曼荼羅應取一千蓮華一華一誦安中台以為奉獻然後引弟子入告三昧耶言為諸欲清淨誓羯磨曼荼羅品復次成就像法於清淨絹㲲上畫觀自在菩薩堅蘇彌盧頂八佛圍繞白月一日於此像前延享三丙寅年秋七月再校了同臘月上旬雕刻成豐山長谷輪下無等志
