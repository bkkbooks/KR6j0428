body:
  text: 大興善寺三藏沙門不空奉詔譯根本真言品第二三昧耶經中略說出無動明王根本祕要成就一切事業為欲令諸修行者顯發諸佛實智故三世諸佛應正等覺者皆由成就陀羅尼門三摩地門於菩提樹下現證最勝三解脫門具一切智彼釋師子由獲無比大明呪藏故能摧伏魔軍利樂一切是故智者安心此門祕密為行應當淨菩提心修行此法速得成就一切智故我薄伽梵大日世尊復為一切修真言者為除障故住於火生三昧說此大摧障真言此祕密明威勢能除一切有情種種障難乃至佛道樹下以此真言力故一切魔軍無不散壞何況世間所有諸障又明此障略有二種一者內障謂從自心而生其類甚多不可具說二者外障而從外而生其類亦甚多以要言之皆能除障也即說大摧障聖者不動明王威怒明曰曩麼三曼縛日羅二合𧹞一怛羅二合吒阿謨伽戰拏二摩賀路灑儜上三娑頗二合吒野吽四怛囉二合摩野怛羅摩野五吽怛囉二合吒唅𤚥六祕密釋曰曩莫三曼哆縛日羅二合𧹞歸命普遍忿怒金剛王也怛羅二合吒殘害破障也阿謨伽戰拏不空威怒極惡中之極也示形狀暴惡無有過者乃至噉食一切世間諸障令無有餘惡之中惡也摩賀路灑儜此是大怒也極惡之中更忿怒暴惡也即是諸佛第一義威猛殘害世間盡其巢穴定入法界歸依金剛界娑頗二合吒野破壞也吽恐怖也怛囉二合麼野堅固也吽怛羅二合吒唅𤚥種子也用後二字為種子諸句義中皆能成事業初戰拏者是死義入阿字門即本無生死義也荼是戰義以此無生死大勢之王與諸四魔戰也次魔是我義入阿字門即是無我亦是空三昧也盧者有囉字垢障義為體有塢聲是三昧也即奢麼他為大三昧也儜是戰義入阿字門即大空三昧也薩是堅義頗是沫義知世間法如聚沫故易破壞也傍有阿字之點即行也吒是戰義能敵障怖畏令破也野是乘義也吽是大空三昧如上說怛是如也囉是無垢也吒是作也謂一切法無作也唅字上有空點是圓寂義亦名大空智入訶字門是行義又有阿聲怖魔障金剛三昧行也野即大空也以此大空不動之行大怖一切魔障也𤚥字亦名大空智為麼字門是我義入阿字門無我也謂一切法本無生滅也又以此大空無我三昧而怖衆魔以此字亦有阿聲及野也阿嚧唅𤚥此四字皆有阿聲即重怖魔極怖畏也即是破內外二障之義也結三昧已即想自身全成㘕字此字想成猶如火色從字發熾然猛焰焚燒身中三毒煩惱及隨煩惱一時頓盡時火亦隨滅唯存㘕字融成皎月在心中作是觀時不宜遲住速轉慧心令其成就澡浴結護身品第三無動金剛極安穩護身印明第一先以二小指內相叉於大指虎口中出並竪二中指二無名指於中指背相交以二頭指各握無名指竪二大指捻中指中節是明曰曩麼三曼多勃馱喃一唵二賀羅賀羅三摩訶儞弭多吽引泮吒半音四爾時無動聖者說洗浴法有二種一者內淨二者外淨內淨者於諸衆生起慈悲喜捨心清淨無我心二者外淨以水洗浴或於河中先結三昧耶印置安頂上誦明三遍即用杵印明護身瀉垢方可結界淨水及土亦用杵印明無動金剛洗浴結護八方印明第二禪度入掌握為拳獨竪進度金剛峯三轉右轉成結界左轉解界及辟除明曰唵唅吽摩訶呬摩畔馱儞畔馱吽畔馱嚩日囉二合嚩日黎二合禰吽泮吒無動金剛洗浴淨水印明第三禪智雙入定慧掌中以印攪水除諸障明曰曩麼三曼哆嚩日囉二合赦一怛囉二合吒阿謨伽戰荼二摩訶嚕灑拏三薩頗二合吒耶吽四怛囉二合莎耶怛囉二合莎耶吽怛𡀔二合吒吽怛𡀔二合吒不動金剛著甲印明第四戒方入掌背相著進力入掌亦如是六度竪合三鈷杵開腕印身上頂加持五處頂上散是名金剛甲明曰唵唅吽嚩日囉二合三摩曳嚩日囉迦縛制護嚩日羅二合吽泮吒半音以此明印印五處即成著甲隨意洗浴不動金剛灌頂印明第五戒方檀慧內相叉忍願竪合進力附智捻方背禪亦然是名本尊灌頂印明曰曩摩悉多羅三合也地尾二合蘖多引南薩羅嚩怛他引蘇哆南紇唎二合薩羅嚩母馱那婢卑也反邏波波羅濕摩鼻曬罽婀婢詵去者怛謨努遞𭻱邏嚩底丁以切尾囉者麗莎嚩二合訶修真言者著甲護身洗浴著衣竟誦明曰唵唅吽塞頗吒耶薩醯吽羅迦沙二合唅泮吒輕呼半音不動金剛杵印真言一切穢處用修真言者欲往一切穢處先用杵印印五處所謂兩肩心額喉頂是也用印之時以明加持至頂上散誦明曰唵阿者邏迦拏戰荼莎馱耶吽泮吒結護道場品第四無動金剛三昧耶印明第一如是依法洗浴已即往精舍以清淨心如常合掌直竪禪智二度於額上思惟諸佛菩薩如對目前放其身心坦然禪悅入三昧耶誦明曰曩摩薩嚩母馱冒地薩怛嚩二合喃那莫蘇悉地莎達儞阿蘖隸二合迦嚕儞嚩羅提怛羅異怛羅異阿皤曳阿底摩㘑那莽素都二合帝波羅摩悉地馱也罽鼻喻二合摩訶訖哩二合閉弊毗也反莎嚩訶禪智並合蓮華掌加持本明安額上思惟諸法本不生不動威怒辟除障難印明第二願力並竪端慧方如鉤勢智度捻如環慧羽亦如是即以忍進劍穿入定鞘中是名無動劍結護方隅界拔刀左繞之辟除一切魔持劍右旋轉下指金剛橛上結虛空界復誦祕密明曩麼三曼哆嚩日囉二合𧹞怛羅二合吒戰荼摩訶路灑拏沙頗二合吒耶吽怛羅二合吒唅𤚥密誦三遍或七遍以印右旋結護左轉辟除及以上下是明威力能大擁護十方大界及以護身并淨除處所乃至三界猶能防護況一方所作是法時隨行者心念明印所及之處能令種種類及難調魍魎之屬皆見熾然金剛威怒如大火聚周遍其處此印功能甚大難說若人住於世窮劫說其功能亦不可盡是名無動金剛劍此印明亦通五部護身結界用無動金剛能成就一切事業杵印明第三竪開止羽掌禪進捻如環各建金剛峯是名無動杵復誦密言曰曩麼三曼多嚩日囉二合𧹞戰拏唵阿者邏迦拏者嚕娑馱耶吽泮吒此杵明印能成就一切事業乃至洗浴明淨土及以護身結界皆用此明印無動金剛牆印明第四戒方進力屈入掌側竪忍願並檀慧禪支屈捻進下文智捻力支亦如是誦明曰唵唅吽嚩日囉二合曼荼隸畔馱畔馱吽泮吒輕呼誦明三遍以印左轉三遍隨心遠近即成就牆界無動金剛網印明第五戒方進力內相叉六度竪合頭相拄開腕頂上右三旋即成金剛堅固網誦明曰唵唅吽嚩日羅二合薩囉二合步嚩儞暮吽泮吒半音結此印已誦明三遍於頂上右旋三匝即成網界無動金剛火焰印明第六二羽翻掌背相叉即成本尊三昧火金剛牆外三旋繞如火猛焰金剛城一切魔軍悉馳散誦明曰唵唅吽嚩日羅二合入嚩二合隸吽泮吒結此火焰印已誦明三遍於金剛牆外右旋三匝即成火院供養品第五無動金剛座印明第一平舒定掌承慧背行人想成金剛座座上更安所生印一切聖者皆隨喜誦明曰唵唅吽嚩日羅二合莎儞梵吽泮吒半音以此明印加持住處得為金剛不壞地即於地上想有金剛座便以如來所生印安置諸佛菩薩於金剛座上便回此印供養諸聖一切如來所生印明第二金剛堅固內相叉檀慧竪開所生印此印名為功德母佛法僧寶住其中請召明王及本尊結此祕印皆雲集便回此印獻諸尊即成閼伽供養佛曩麼薩嚩母馱地薩怛嚩二合喃阿引摩羅尾迦羅二合多帝餌儞阿羅逝莎嚩二合訶便以此如來所生印想為閼伽奉獻諸佛菩薩諸尊賢聖常作此法供養是速得成就復觀不動聖者住本位用前灌頂印明奉獻本尊即誦根本明一遍能令聖者歡喜速得圓滿成就故又持明行者次結三昧耶印安置頂上印如前已說即想自身如本尊乘八葉蓮華手執香爐即令三業寂然無亂往詣精舍至道場門三稱吽字驚覺諸聖入精舍已已上安於三昧印後次應如常禮懺奉獻閼伽應作是念我今當捨全身供養十方三世常住三寶道場衆會唯願一切諸佛菩薩乞與我等作大加持最上成就得成金剛薩埵悉地當攝受故請求加護如是三白便即云云又以杵印如前結界加持本尊座以如來所生印奉獻諸佛菩薩每日三時如法供養或時忘念闕少法則即犯三昧耶先誦大輪金剛明及結大輪印用除其咎謝其過罪大輪金剛懺悔印明第三如是依法結護已皆有闕犯三昧耶密持蘇摩金剛明懺悔四時諸過咎戒方進力內相鉤六度竪合金剛輪結此明印安頂上右旋三匝謝其過誦明曰曩麼悉底哩耶四合地尾迦喃薩縛怛他誐多喃唵尾囉耳尾囉耳摩訶斫迦羅嚩日羅二合薩哆薩哆莎囉帝莎囉帝怛囉二合曳怛囉二合曳尾馱摩儞三盤若儞怛囉二合摩底悉馱阿紇哩曳怛唎二合藍引莎嚩二合訶持真言者結護了皆有闕犯三昧耶當結此印安頂上誦明三遍或七遍右旋三匝懺謝衆過然後念誦本尊明無動金剛滿足印明第四虛心合掌甲相柱是名本尊滿足印種種供養及塗香焚香燈明并飲食上妙供養吉祥事俱持此印皆圓滿誦明曰曩麼悉底哩也四合陀嚩二合蘖哆喃薩嚩怛他蘖哆喃喑尾哆哩摩訶嚩日囉二合薩怛薩怛莎囉帝莎羅帝莎縛訶復以此明印想水陸珍寶及寶山等物海中妙寶摩尼華樹王等悉皆無主所攝以我福德力諸佛加持力願此香華雲遍滿諸佛剎土供養一切諸佛菩薩滿足上願塗香供養印明第五印如前誦明曰曩麼悉底哩三合也陀嚩二合蘖哆喃薩縛怛他蘖哆喃阿三摩彥度怛謎素彥馱嚩底薩頗二合羅𠰘𤚥哦哦喃摩呼那曳泥去尾薩嚩嘌他二合莎馱儞莎嚩二合訶燒香供養印明第六誦明曰曩麼悉底哩三合也陀嚩二合蘖哆喃薩嚩怛他蘖哆喃唵阿蘖哩阿蘖哩始棄始棄南薩嚩怛度麼始棄莎嚩二合訶華供養印明第七誦明曰曩麼悉底哩三合也陀嚩蘖哆喃薩嚩怛他蘖哆喃阿嚩路枳哆二合摩訶布澀波二合嚩底莎嚩二合訶飲食供養印明第八誦明曰曩麼悉底哩三合也陀嚩蘖哆喃薩嚩怛他蘖哆喃唵阿囉婆阿囉婆迦囉迦囉嚩哩嚩哩嚩鄰嚩鄰那陀毗摩訶嚩哩莎嚩二合訶燈供養印明第九誦明曰曩麼悉底哩三合也陀嚩蘖哆喃薩嚩怛他蘖哆喃阿藍帝爾嚩二合藍帝儞波必也反儒底始棄莎嚩訶普莊嚴供養明印第十誦明曰曩麼薩婆母馱菩地薩埵嚩喃薩婆他烏特二合伽帝塞破羅呬𤚥伽伽那劍莎縛訶持此明力故能生如意寶供養一切諸佛菩薩衆會由誦此讚歎福德力故令此供養普遍一切諸佛菩薩衆會讚歎明曰曩麼薩婆母馱菩地薩埵嚩二合喃一薩婆怛路二合僧句素弭哆二鼻枳惹二合囉始吠三那謨素都帝薩嚩二合訶四復誦無動明王根本明三遍能令聖者歡喜與願速得圓滿菩提故次即懺悔先業一切罪障願皆消滅復作此願我今所有一切善業回施法界衆生令我此願速得成就無上菩提具一切種智復誦此加持明八遍明曰曩麼薩埵嚩喃那暮素都帝摩訶嚩日羅二合薩婆薩埵嚩四路迦羅底瑟他薩婆怛羅㘑吠達羅摩摩拏地瑟他耶莎嚩二合訶如上供養加持本尊已結前灌頂印而自灌頂無動金剛虛空部母印第十一結此虛空明印用護身及護本尊故名部母亦名虛空眼進力俱入蓮華掌即名虛空部母眼以印護身及護本尊二羽分開捻珠印亦名聖者虛空眼明曰曩麼悉底哩二合也陀嚩二合拏蘖帝弊薩嚩怛他蘖帝弊唵哦哦那路者儞哦哦那三摩薩嚩都嚕蘖哆底沙囉三婆吠入嚩二合攞那謨阿謨伽喃莎嚩二合訶無動金剛法界生印明第十二戒方進力內相叉六度竪合頭相拄開腕加持左右臂舉印漸至頂上開真言悉地隨此生是故名為法生印結印加持誦明曰曩麼薩嚩母馱地薩怛嚩喃阿薩羅嚩他薩羅縛多囉路計莎嚩二合訶法生印者從一切如來不動菩提心生從大悲本願生從佛口生從法化生故名法生印次誦前虛空部母眼明七遍即觀一切諸佛菩薩如在目前手執數珠如法念誦如是廣作佛事已當結本尊根本三昧耶印先誦金剛百字真言為令加持不傾動故捻數珠明印第十三其印準前部母印二羽分開即是此印也誦明曰曩麼嚩日羅二合目契弊薩嚩怛他引蘖帝毗喻二合婆伽梵特縛弊畢遮反怛地也二合他嘺唎健馱哩戰荼唎摩蹬擬濱俄哩怛他引伽多吠曳二合使怛摩底吽入縛二合哩多帝逝伊能迦羅焰句嚕莎縛二合訶無動金剛根本三昧耶印明第十四亦名根本身印六度和合內相叉直舒進力頭相拄智度屈捻方便背禪捻戒背亦如是當誦金剛百字明加持自身堅固住復誦本明成悉地真言曰唵阿三摩阿三摩三曼哆都那哆怛嚩泌底舍那儞訶羅訶羅娑摩二合囉拏娑麼二合囉拏尾蘖哆母馱達摩帝薩羅薩羅三摩嚩邏荷羅荷羅苻娑苻娑怛羅耶怛羅耶伽那伽那摩訶嚩囉囉迦沙二合儞入縛二合攞那入嚩二合那娑伽㘑莎縛二合訶誦百字明加持復觀一切諸佛菩薩在行者前攝受如前種種供養廣大成就所謂現世所求一切悉地名最勝悉地亦名金剛薩埵悉地復作是願願以此功德普及於一切我等與衆生皆共成佛道每日三時念誦時別最少一百八遍已下不成念誦了以虛空眼真言及印如持本尊令歡喜與願亦令堅固不散後誦根本印明曰其手印準前根本三昧耶是以二手中指已下並向內相叉便為鉤二頭指側相拄二大指各捻無名指甲即成誦根本明三遍
